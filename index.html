<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividades HTML5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Actividades HTML5</h1>

    <!-- Actividad 1 -->
    <div class="contenedor">
        <h2>Encuesta de Salud</h2>

        <form>

            <label>Nombre:</label>
            <input type="text">

            <label>Edad:</label>
            <input type="number" min="1" max="100">

            <label>Peso:</label>
            <input type="number" min="20" max="200">

            <label>Nivel de dolor:</label>
            <input type="range" min="0" max="10">

            <label>Tipo de sangre:</label>
            <select>
                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>O+</option>
                <option>O-</option>
            </select>

            <button>Enviar</button>

        </form>
    </div>

    <!-- Actividad 2 -->
    <div class="contenedor">
        <h2>Código Postal</h2>

        <form>

            <label>Ingresa tu código postal:</label>

            <input type="text" pattern="[0-9]{5}" placeholder="12345" required>

            <button>Validar</button>

        </form>
    </div>

</body>
</html>
